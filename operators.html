<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Management</title>
    <link rel="stylesheet" href="css/operators.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="operators">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Operator Registration</h2>
            <form id="createOperatorForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="createFname" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="createLname" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="createUsername" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="createEmail" class="input-field" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Phone</label>
                        <input type="text" id="createPhone" class="input-field" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Temporary Password</label>
                        <input type="text" id="createPassword" class="input-field" required>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Register</button>
                    <button type="reset" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Operators</h2>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Phone</th>
                            <th>No. of Buses</th>
                            <th>Acc Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>

        <section class="content-card">
            <h2>Edit Operator</h2>
            <form id="editOperatorForm">
                <input type="hidden" id="editOperatorId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFname" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLname" class="input-field">
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" class="input-field">
                    </div>

                     <div class="form-group full-width">
                        <label>Phone</label>
                        <input type="text" id="editPhone" class="input-field">
                    </div>

                     <div class="form-group full-width">
                        <label>New Temporary Password (Leave blank to keep current)</label>
                        <input type="text" id="editPassword" class="input-field">
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Edit</button>
                    <button type="reset" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="js/navbar.js"></script>
    <script src="config.js"></script>
    <script src="js/operators.js"></script>
</body>
</html>
