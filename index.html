<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Bus Tracking Login</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pattaya&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <div class="main-container">
        <div class="brand-section">
            <h1>Bus Buddy</h1>
            <span class="titleSpan">Your very own bus tracking companion</span>
        </div>

        <div class="login-card">
            <h3>Login</h3>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" class="input-field" required>
                        <i class="fa-solid fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <div id="roleModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Select Your Portal</h3>
            <div class="role-options">
                <button type="button" class="role-btn" onclick="selectRole('admin')">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>Admin</span>
                </button>
                <button type="button" class="role-btn" onclick="selectRole('operator')">
                    <i class="fa-solid fa-bus"></i>
                    <span>Operator</span>
                </button>
            </div>
        </div>
    </div>

    <script src="config.js"></script> 
    <script src="login.js"></script>
</body>
</html>
