<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Status - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/bus-status.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body data-active-page="status">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        <div class="content-card">
            <h2>Current Running Bus Status</h2>

            <div class="search-container">
                <input type="text" id="searchInput" class="input-field" placeholder="Search Registration No (e.g. WP-1122)...">
            </div>

            <table class="status-table">
                <thead>
                    <tr>
                        <th>Bus Reg No</th>
                        <th>Route Code</th>
                        <th>Start Location</th>
                        <th>End Location</th>
                        <th>Last GPS Update</th>
                        <th>Passenger Count</th>
                    </tr>
                </thead>
                <tbody id="busStatusTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #3c3c3c;">Loading bus data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/bus-status.js"></script>
</body>
</html>
