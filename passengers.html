<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Management</title>
    
    <link rel="stylesheet" href="css/passengers.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="passengers">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Passenger Registration</h2>
            <form id="createPassengerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="createFname" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="createLname" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="createUsername" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="createEmail" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="createPhone" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Initial Balance</label>
                        <input type="number" step="0.01" id="createBalance" class="input-field" value="0.00">
                    </div>

                    <div class="form-group">
                        <label>Assign Card</label>
                        <select id="createCardId" class="input-field">
                            <option value="">-- No Card --</option>
                            <option value="1">001153 (Sample ID 1)</option>
                            <option value="2">001154 (Sample ID 2)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Temporarily Password</label>
                        <input type="text" id="createPassword" class="input-field" required>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Register</button>
                    <button type="reset" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Card Replacement</h2>
            <form id="replaceCardForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Username</label>
                        <select id="replaceUsername" class="input-field">
                            <option>username.17</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>New Card No</label>
                        <select id="replaceNewCard" class="input-field">
                            <option>0112436</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-blue">Replace</button>
                    <button type="button" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Passengers</h2>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Acc Balance</th>
                            <th>Card ID</th>
                            <th>Card Status</th>
                            <th>Acc Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="passengerTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; color: #3c3c3c;">Loading passenger data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="content-card" id="editPassengerSection" style="display: none;">
            <h2>Edit Passenger</h2>
            <form id="editPassengerForm">
                
                <input type="hidden" id="editPassengerId">

                <div class="form-grid">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFname" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLname" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" class="input-field" required>
                    </div>

                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" id="editPhone" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Balance</label>
                        <input type="number" step="0.01" id="editBalance" class="input-field" required>
                    </div>

                    <div class="form-group full-width">
                        <label>New Temporarily Password (Leave blank to keep current)</label>
                        <input type="text" id="editPassword" class="input-field">
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Save</button>
                    <button type="reset" class="btn btn-red" id="cancelEditBtn">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="js/navbar.js"></script>
    <script src="config.js"></script> 
    <script src="js/passengers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
