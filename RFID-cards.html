<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Management - Obsidian Bus Tracking</title>
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/RFID-cards.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="cards">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Card Issuing</h2>
            <form id="registerCardForm">
                <div class="form-group">
                    <label>RFID UID</label>
                    <input type="text" id="regRfidUid" class="input-field" placeholder="e.g. A1B2C3D4" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Register</button>
                    <button type="reset" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

       <section class="content-card">
            <h2>Cards</h2>
            
            <div style="margin-bottom: 15px;">
                <input type="text" id="searchCardInput" class="input-field" placeholder="Search by RFID UID..." style="max-width: 300px;">
            </div>
            
            <div class="table-responsive">
                <table class="cards-table">
                    <thead>
                        <tr>
                            <th>RFID UID</th>
                            <th>Assigned Passenger</th>
                            <th>Card Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cardsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center; color: #3c3c3c;">Loading card data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="config.js"></script> 
    <script src="js/navbar.js"></script>
    <script src="js/rfid-cards.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
