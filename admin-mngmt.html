<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Management - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/admin-mngmnt.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="admin">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Admin Registration</h2>
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="regFname" class="input-field" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="regLname" class="input-field" placeholder="" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUsername" class="input-field" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" class="input-field" placeholder="" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="regPhone" class="input-field" placeholder="" required>
                </div>

                <div class="form-group">
                    <label>Temporarily Password</label>
                    <input type="password" id="regPassword" class="input-field" placeholder="" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Register</button>
                    <button type="reset" class="btn btn-red">Cancel</button> 
                </div>
            </form>
        </section>


        <section class="content-card">
            <h2>Admins</h2>
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Phone</th>
                            <th>Acc Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #3c3c3c;">Loading admin data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>


        <section class="content-card" id="editAdminSection" style="display: none;">
            <h2>Edit Admin</h2>
            <form id="editAdminForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFname" class="input-field" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLname" class="input-field" placeholder="" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="editUsername" class="input-field" placeholder="" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="editEmail" class="input-field" placeholder="" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="editPhone" class="input-field" placeholder="" required>
                </div>

                <div class="form-group">
                    <label>New Password (Leave blank to keep current)</label>
                    <input type="password" id="editPassword" class="input-field" placeholder="">
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">save</button>
                    <button type="reset" class="btn btn-red" id="cancelEditBtn">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="config.js"></script> 
    <script src="js/navbar.js"></script>
    <script src="js/admin-mngmnt.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
