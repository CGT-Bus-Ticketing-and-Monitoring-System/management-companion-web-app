<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/routes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="routes">

    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Route Creation</h2>
            <form id="createRouteForm">
                <div class="form-group">
                    <label>Route Code</label>
                    <input type="text" id="createCode" class="input-field" placeholder="e.g. 101" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Start Location</label>
                        <input type="text" id="createStart" class="input-field" placeholder="e.g. Colombo" required>
                    </div>
                    <div class="form-group">
                        <label>End Location</label>
                        <input type="text" id="createEnd" class="input-field" placeholder="e.g. Kandy" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Base Fare</label>
                    <input type="number" step="0.01" id="createFare" class="input-field" placeholder="0.00" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Create Route</button>
                    <button type="button" class="btn btn-red" onclick="this.form.reset()">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Bus Route Assigning</h2>
            <form id="assignBusForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Route Code</label>
                        <select id="assignRouteSelect" class="input-field">
                            </select>
                    </div>
                    <div class="form-group">
                        <label>Bus Registration No</label>
                        <select id="assignBusSelect" class="input-field">
                            </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Assign Bus</button>
                    <button type="button" class="btn btn-red" onclick="this.form.reset()">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Bus Routes</h2>
            <div class="table-responsive">
                <table class="routes-table">
                    <thead>
                        <tr>
                            <th>Route Code</th>
                            <th>Start Location</th>
                            <th>End Location</th>
                            <th>Base Fare</th>
                            <th>Status</th>
                            <th>Assigned Buses</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>

        <section class="content-card">
            <h2>Route Editing</h2>
            <form id="editRouteForm">
                <input type="hidden" id="editRouteId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Location</label>
                        <input type="text" id="editStart" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>End Location</label>
                        <input type="text" id="editEnd" class="input-field" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Base Fare</label>
                    <input type="number" step="0.01" id="editFare" class="input-field" required>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Edit Route</button>
                    <button type="button" class="btn btn-red" onclick="document.getElementById('editRouteForm').reset()">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="js/navbar.js"></script>
    <script src="config.js"></script> 
    <script src="js/route.js"></script>
</body>
</html>
