<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/home.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="home">

    <div id="navbar-placeholder"></div>

    <main class="dashboard-container">
        <h1>Welcome, [Name]</h1>

        <div class="stats-grid">
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-bus"></i>
                    <h3>Total Active<br>Buses</h3>
                </div>
                <p class="stat-number">2500</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-user"></i>
                    <h3>Total Registered<br>Passengers</h3>
                </div>
                <p class="stat-number">112,000</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-suitcase"></i>
                    <h3>Trips Commenced<br>Today</h3>
                </div>
                <p class="stat-number">80,000</p>
            </div>

            <div class="card">
                <div class="card-header">
                    
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-bus-simple"></i>
                        <i class="fa-solid fa-circle-exclamation alert-badge"></i>
                    </div>
                    <h3>Total Offline<br>Buses</h3>
                </div>
                <p class="stat-number">260</p>
            </div>
        </div>

        <div class="report-section">
            <div class="report-info">
                <i class="fa-solid fa-file"></i>
                <h3>Generate System<br>Summary Reports</h3>
            </div>
            
            <div class="report-actions">
                <div class="select-wrapper">
                    <select name="date-range" id="date-range">
                        <option value="30">Last 30 Days</option>
                        <option value="7">Last 7 Days</option>
                        <option value="1">Today</option>
                    </select>
                </div>
                <button class="generate-btn">Generate</button>
            </div>
        </div>

    </main>

    <script src="js/navbar.js"></script>
</body>
</html>
