<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Schedule - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/schedule.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="schedule"> 
    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Bus Schedule Selection</h2>
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label>Route Code</label>
                        <select class="input-field">
                            <option value=""></option>
                            <option value="240">240</option>
                            <option value="244">244</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bus Name</label>
                        <select class="input-field">
                            <option value=""></option>
                            <option value="bus1">Bus 1</option>
                            <option value="bus2">Bus 2</option>
                        </select>
                    </div>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Add new Schedule</h2>
            <form id="addScheduleForm">
                <div class="form-row-3">
                    <div class="form-group">
                        <label>Departure Time</label>
                        <input type="time" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Arrival time</label>
                        <input type="time" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select class="input-field">
                            <option value=""></option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Schedule</button>
                    <button type="button" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Current Schedule</h2>
            <div class="table-responsive">
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>Departure</th>
                            <th>Arrival</th>
                            <th>Direction</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>09:00</td>
                            <td>09:00</td>
                            <td></td>
                            <td>Active</td>
                            <td class="action-icons">
                                <i class="fa-solid fa-pen-to-square icon-edit"></i>
                                <i class="fa-solid fa-ban icon-delete"></i>
                            </td>
                        </tr>
                        <tr>
                            <td>14:15</td>
                            <td>14:15</td>
                            <td></td>
                            <td>Active</td>
                            <td class="action-icons">
                                <i class="fa-solid fa-pen-to-square icon-edit"></i>
                                <i class="fa-solid fa-ban icon-delete"></i>
                            </td>
                        </tr>                        
                    </tbody>
                </table>
            </div>
        </section>

        <section class="content-card">
            <h2>Bus Schedule Editing</h2>
            <form id="editScheduleForm">
                <div class="form-row-3">
                    <div class="form-group">
                        <label>Departure Time</label>
                        <input type="time" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Arrival time</label>
                        <input type="time" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select class="input-field">
                            <option value=""></option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Edit</button>
                    <button type="button" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="js/navbar.js"></script>
</body>
</html>
