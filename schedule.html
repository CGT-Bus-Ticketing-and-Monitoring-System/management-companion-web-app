<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Schedule - Obsidian Bus Tracking</title>
    
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/schedule.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-active-page="schedule"> 
    <div id="navbar-placeholder"></div>

    <main class="page-container">
        
        <section class="content-card">
            <h2>Bus Schedule Selection</h2>
            <form id="selectionForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Route Code</label>
                        <select id="routeSelect" class="input-field" required>
                            <option value="" disabled selected>Select Route</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Bus Name</label>
                        <select id="busSelect" class="input-field" required>
                            <option value="" disabled selected>Select Bus</option>
                        </select>
                    </div>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Add new Schedule</h2>
            <form id="addScheduleForm">
                <div class="form-row-3">
                    <div class="form-group">
                        <label>Departure Time</label>
                        <input type="time" id="addDeparture" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Arrival time</label>
                        <input type="time" id="addArrival" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select id="addDirection" class="input-field" required>
                            <option value="" disabled selected>Select Direction</option>
                            <option value="FORWARD">FORWARD</option>
                            <option value="RETURN">RETURN</option>
                        </select>
                    </div>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Add Schedule</button>
                    <button type="reset" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

        <section class="content-card">
            <h2>Current Schedule</h2>
            <div class="table-responsive">
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>Departure</th>
                            <th>Arrival</th>
                            <th>Direction</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleTableBody">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #666;">Please select a Route and a Bus to view the schedule.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="content-card" id="editScheduleSection" style="display: none;">
            <h2>Bus Schedule Editing</h2>
            <form id="editScheduleForm">
                <input type="hidden" id="editScheduleId">
                
                <div class="form-row-3">
                    <div class="form-group">
                        <label>Departure Time</label>
                        <input type="time" id="editDeparture" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Arrival time</label>
                        <input type="time" id="editArrival" class="input-field" required>
                    </div>
                    <div class="form-group">
                        <label>Direction</label>
                        <select id="editDirection" class="input-field" required>
                            <option value="FORWARD">FORWARD</option>
                            <option value="RETURN">RETURN</option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-blue">Save Changes</button>
                    <button type="button" id="cancelEditBtn" class="btn btn-red">Cancel</button>
                </div>
            </form>
        </section>

    </main>

    <script src="config.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/schedule.js"></script>
</body>
</html>
